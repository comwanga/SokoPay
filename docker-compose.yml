version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sokopay
      POSTGRES_PASSWORD: sokopay_dev
      POSTGRES_DB: sokopay
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sokopay -d sokopay"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: postgresql://sokopay:sokopay_dev@postgres:5432/sokopay
      RUST_LOG: sokopay=info,tower_http=info
      LOG_FORMAT: json
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-min-32-chars}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3001}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      RATE_CACHE_SECONDS: ${RATE_CACHE_SECONDS:-60}
      UPLOAD_DIR: /app/uploads
      # Set to a strong random string in production (openssl rand -base64 32).
      # Empty value disables the /api/metrics endpoint (returns 503).
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://localhost:3001/api
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
  uploads_data:
