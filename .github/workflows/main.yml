name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: agri_pay=debug

jobs:
  # ─────────────────────────────────────────────
  # Backend — Rust
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint (Clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features -- --nocapture
        env:
          MPESA_ENV: sandbox

      - name: Build release binary
        run: cargo build --release --locked

  # ─────────────────────────────────────────────
  # Frontend — Node / TypeScript / Vite
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_KEY: ''

  # ─────────────────────────────────────────────
  # Docker — validate Compose file
  # ─────────────────────────────────────────────
  docker:
    name: Docker Compose validate
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
        env:
          MPESA_CONSUMER_KEY: placeholder
          MPESA_CONSUMER_SECRET: placeholder
          MPESA_INITIATOR_PASSWORD: placeholder
          MPESA_CERT_PATH: /dev/null
          API_KEY: placeholder
          WEBHOOK_SECRET: placeholder
          BASE_URL: http://localhost:3001
