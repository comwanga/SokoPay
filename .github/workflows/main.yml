name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: agri_pay=debug

jobs:
  # ─────────────────────────────────────────────
  # Backend — Rust
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agripay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint (Clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features -- --nocapture
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/agripay_test

      - name: Build release binary
        run: cargo build --release --locked

      - name: Security audit
        run: |
          cargo install cargo-audit --quiet
          # RUSTSEC-2023-0071: Marvin Attack in `rsa` crate — no upstream fix
          # available. We use HS256 (HMAC) JWT only; RSA code path is never
          # invoked. Re-evaluate when jsonwebtoken ships a patched release.
          cargo audit --ignore RUSTSEC-2023-0071

  # ─────────────────────────────────────────────
  # Frontend — Node / TypeScript / Vite
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_KEY: ''

  # ─────────────────────────────────────────────
  # Docker — validate Compose file
  # ─────────────────────────────────────────────
  docker:
    name: Docker Compose validate
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
        env:
          JWT_SECRET: change-this-in-production-min-32-chars
          PUBLIC_BASE_URL: http://localhost:3001
