<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SokoPay - Buy & Sell with Lightning</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SokoPay" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- SEO -->
    <meta name="description" content="Buy and sell in Africa — pay with M-Pesa or Bitcoin Lightning. No bank account needed." />

    <script>
      // Restore path encoded by 404.html for GitHub Pages SPA routing
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          window.history.replaceState(null, '', '/' + decodeURIComponent(p));
        }
      })();

      // Register service worker for offline support + installability
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('SW registration failed:', err);
          });
        });
      }
    </script>
  </head>
  <body>
    <!-- Skip navigation for keyboard users -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[200] focus:px-4 focus:py-2 focus:rounded-lg focus:bg-brand-500 focus:text-white focus:font-semibold focus:text-sm focus:shadow-lg"
    >
      Skip to main content
    </a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
